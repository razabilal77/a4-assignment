<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jon Daniel Portfolio</title>
    <link rel="stylesheet" href="portfolio.css">
</head>
<body>

    <div class="bento-container">
        
        <div class="left-sidebar">
            <div class="top-tag">❖ About Me</div>
            <div class="profile-center">
                <div class="circle-ring">
                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=400" alt="Jon Daniel">
                </div>
            </div>
            <div class="profile-info">
                <h2>Im,<br>Jon<br>Daniel</h2>
                <div class="email-row">inquiry@jondaniel.design ✉</div>
            </div>
            <div class="badge-absolute">
                <div class="badge-inner">MY DESIGN PORTFOLIO</div>
            </div>
        </div>

        <div class="right-content">
            <div class="header-row">
                <h1 class="main-heading">Portfolio<sup>↗</sup></h1>
            </div>

            <div class="grid-layout">
                <div class="card card-flamingo">
                    <img src="https://images.unsplash.com/photo-1519074002996-a69e7ac46a42?w=600" alt="Flamingo Art">
                    <div class="play-indicator">▶</div>
                </div>

                <div class="card card-stats">
                    <div class="stat-box cyan-bg">
                        <h3>251</h3>
                        <p>Projects</p>
                        <span class="corner-arrow">┐</span>
                    </div>
                    <div class="stat-box purple-bg">
                        <h3>156</h3>
                        <p>Awards</p>
                        <span class="corner-arrow">┐</span>
                    </div>
                </div>

                <div class="card card-clients">
                    <span class="corner-arrow">┐</span>
                    <div class="brand-icon">🍏</div>
                    <p>Clients</p>
                </div>

                <div class="card card-awards-global">
                    <div class="black-half">
                        <div class="sphere-graphic"></div>
                    </div>
                    <div class="orange-half">
                        <span class="corner-arrow">┐</span>
                        <h3>172</h3>
                        <p>Global Design Awards.</p>
                    </div>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
